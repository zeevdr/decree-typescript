version: v2
plugins:
  - local: ./node_modules/.bin/protoc-gen-ts_proto
    out: src/generated
    opt:
      - esModuleInterop=true
      - outputServices=grpc-js
      - env=node
      - useExactTypes=false
      - snakeToCamel=true
      - forceLong=number
      - importSuffix=.js
inputs:
  - directory: ../decree/proto
